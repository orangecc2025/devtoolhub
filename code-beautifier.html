        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;

            --text-secondary: #9CA3AF;

            box-shadow: var(--shadow);
        }
        .card-title {
            font-size: 1.125rem;

            margin-bottom: 1rem;

            align-items: center;
            gap: 0.5rem;

        .toolbar {

    <script>
        let currentLang = 'zh';
        let indentType = 'space';
        let currentMode = 'beautify';

        const samples = {
            javascript: `function fibonacci(n){if(n<=1)return n;return fibonacci(n-1)+fibonacci(n-2);}const arr=[1,2,3,4,5];console.log(arr.map(x=>x*2));`,
            css: `.container{display:flex;flex-direction:row;justify-content:center;}.btn{padding:10px 20px;background:#4F46E5;color:white;border-radius:8px;}`,
            html: `<div class="container"><h1>标题</h1><p>段落内容</p><button onclick="alert()">点击</button></div>`,
            sql: `SELECT u.name,u.email,o.total FROM users u LEFT JOIN orders o ON u.id=o.user_id WHERE o.total>100 ORDER BY o.total DESC LIMIT 10;`,
            xml: `<root><user id="1"><name>张三</name><email>zhangsan@example.com</email></user></root>`
        };

        function init() {
            const textarea = document.getElementById('input-code');
            textarea.addEventListener('input', updateStats);
            textarea.addEventListener('scroll', syncScroll);
            updateStats();
        }

        function processCode() {
            const code = document.getElementById('input-code').value;
            const lang = document.getElementById('language').value;
            const indentSize = document.getElementById('indent-size').value;
            
            if (!code.trim()) {
                showToast(currentLang === 'zh' ? '请输入代码' : 'Please enter code');
                return;
            }

            let result;
            if (currentMode === 'minify') {
                result = minifyCode(code, lang);
            } else {
                result = beautifyCode(code, lang, indentSize, indentType);
            }

            document.getElementById('output-preview').innerHTML = highlightSyntax(result, lang);
            updateStats();
            showToast(currentLang === 'zh' ? '处理完成' : 'Processing complete');
        }

        function beautifyCode(code, lang, indentSize, indentType) {
            const indent = indentType === 'tab' ? '\t' : ' '.repeat(parseInt(indentSize));
            
            if (lang === 'javascript') {
                return beautifyJS(code, indent);
            } else if (lang === 'css') {
                return beautifyCSS(code, indent);
            } else if (lang === 'html') {
                return beautifyHTML(code, indent);
            } else if (lang === 'sql') {
                return beautifySQL(code, indent);
            } else if (lang === 'xml') {
                return beautifyXML(code, indent);
            }
            return code;
        }

        function beautifyJS(code, indent) {
            let result = code;
            result = result.replace(/\s*([{};,])\s*/g, '$1');
            result = result.replace(/\)\{/g, ') {');
            result = result.replace(/\{/g, ' {\n' + indent);
            result = result.replace(/\}/g, '\n' + indent + '}');
            result = result.replace(/;\n/g, ';\n');
            let lines = result.split('\n');
            let indentLevel = 0;
            lines = lines.map(line => {
                if (line.includes('}')) indentLevel = Math.max(0, indentLevel - 1);
                let indented = indent.repeat(indentLevel) + line.trim();
                if (line.includes('{')) indentLevel++;
                return indented;
            });
            return lines.join('\n').trim();
        }

        function beautifyCSS(code, indent) {
            let result = code;
            result = result.replace(/\s*([{};])\s*/g, '$1');
            result = result.replace(/\{/g, ' {\n' + indent);
            result = result.replace(/}/g, '\n}');
            result = result.replace(/;/g, ';\n' + indent);
            let lines = result.split('\n').filter(l => l.trim());
            return indent + lines.join('\n' + indent);
        }

        function beautifyHTML(code, indent) {
            let result = code;
            result = result.replace(/>\s+</g, '>\n<');
            let lines = result.split('\n');
            let indentLevel = 0;
            lines = lines.map(line => {
                line = line.trim();
                if (line.startsWith('</')) indentLevel = Math.max(0, indentLevel - 1);
                let indented = indent.repeat(indentLevel) + line;
                if (line.startsWith('<') && !line.startsWith('</') && !line.startsWith('<?') && !line.startsWith('<!') && !line.endsWith('/>') && !line.includes('</')) {
                    indentLevel++;
                }
                return indented;
            });
            return lines.join('\n');
        }

        function beautifySQL(code, indent) {
            const keywords = ['SELECT', 'FROM', 'WHERE', 'JOIN', 'LEFT', 'RIGHT', 'INNER', 'OUTER', 'ON', 'AND', 'OR', 'ORDER BY', 'GROUP BY', 'HAVING', 'LIMIT', 'OFFSET', 'INSERT', 'INTO', 'VALUES', 'UPDATE', 'SET', 'DELETE', 'CREATE', 'TABLE', 'DROP', 'ALTER', 'INDEX', 'UNION', 'DISTINCT', 'AS', 'IN', 'NOT', 'NULL', 'IS', 'LIKE', 'BETWEEN'];
            let result = code;
            keywords.forEach(kw => {
                const regex = new RegExp('\\b' + kw + '\\b', 'gi');
                result = result.replace(regex, '\n' + indent + kw);
            });
            return result.trim().split('\n').filter(l => l.trim()).join('\n');
        }

        function beautifyXML(code, indent) {
            return beautifyHTML(code, indent);
        }

        function minifyCode(code, lang) {
            let result = code;
            result = result.replace(/\/\*[\s\S]*?\*\//g, '');
            result = result.replace(/\/\/.*$/gm, '');
            result = result.replace(/\s+/g, ' ');
            result = result.replace(/\s*([{};:,])\s*/g, '$1');
            result = result.replace(/;\}/g, '}');
            return result.trim();
        }

        function highlightSyntax(code, lang) {
            let highlighted = escapeHtml(code);
            
            if (lang === 'javascript') {
                highlighted = highlighted
                    .replace(/\b(function|const|let|var|if|else|for|while|return|class|extends|import|export|from|async|await|try|catch|throw|new|this|true|false|null|undefined)\b/g, '<span class="syntax-keyword">$1</span>')
                    .replace(/('.*?'|".*?"|`[\s\S]*?`)/g, '<span class="syntax-string">$1</span>')
                    .replace(/\b(\d+\.?\d*)\b/g, '<span class="syntax-number">$1</span>')
                    .replace(/(\/\/.*$)/gm, '<span class="syntax-comment">$1</span>')
                    .replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="syntax-comment">$1</span>')
                    .replace(/\b([a-zA-Z_]\w*)\s*\(/g, '<span class="syntax-function">$1</span>(');
            } else if (lang === 'css') {
                highlighted = highlighted
                    .replace(/([.#]?[a-zA-Z_][\w-]*)\s*\{/g, '<span class="syntax-tag">$1</span> {')
                    .replace(/([a-zA-Z-]+)\s*:/g, '<span class="syntax-attr">$1</span>:')
                    .replace(/(#[0-9a-fA-F]{3,8})/g, '<span class="syntax-string">$1</span>')
                    .replace(/(\d+\.?\d*(px|em|rem|%|vh|vw|s|ms)?)/g, '<span class="syntax-number">$1</span>')
                    .replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="syntax-comment">$1</span>');
            } else if (lang === 'html' || lang === 'xml') {
                highlighted = highlighted
                    .replace(/(&lt;\/?[a-zA-Z][a-zA-Z0-9]*)/g, '<span class="syntax-tag">$1</span>')
                    .replace(/([a-zA-Z-]+)=/g, '<span class="syntax-attr">$1</span>=')
                    .replace(/(".*?"|'.*?')/g, '<span class="syntax-string">$1</span>');
            } else if (lang === 'sql') {
                const sqlKeywords = 'SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|AND|OR|ORDER BY|GROUP BY|HAVING|LIMIT|OFFSET|INSERT|INTO|VALUES|UPDATE|SET|DELETE|CREATE|TABLE|DROP|ALTER|INDEX|UNION|DISTINCT|AS|IN|NOT|NULL|IS|LIKE|BETWEEN';
                highlighted = highlighted
                    .replace(new RegExp('\\b(' + sqlKeywords + ')\\b', 'gi'), '<span class="syntax-keyword">$1</span>')
                    .replace(/('.*?')/g, '<span class="syntax-string">$1</span>')
                    .replace(/\b(\d+\.?\d*)\b/g, '<span class="syntax-number">$1</span>')
                    .replace(/(--.*$)/gm, '<span class="syntax-comment">$1</span>');
            }
            
            return highlighted;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateStats() {
            const input = document.getElementById('input-code').value;
            const output = document.getElementById('output-preview').textContent || input;
            
            const inputSize = new Blob([input]).size;
            const outputSize = new Blob([output]).size;
            const reduction = inputSize > 0 ? Math.round((1 - outputSize / inputSize) * 100) : 0;
            
            document.getElementById('input-lines').textContent = input.split('\n').length;
            document.getElementById('input-size').textContent = formatSize(inputSize);
            document.getElementById('output-size').textContent = formatSize(outputSize);
            document.getElementById('reduction').textContent = (reduction > 0 ? '-' : '') + reduction + '%';
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function syncScroll(e) {
            const preview = document.getElementById('output-preview');
            preview.scrollTop = e.target.scrollTop;
        }

        function setIndentType(type) {
            indentType = type;
            document.getElementById('indent-tab-btn').classList.toggle('active', type === 'tab');
            document.getElementById('indent-space-btn').classList.toggle('active', type === 'space');
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('beautify-btn').classList.toggle('active', mode === 'beautify');
            document.getElementById('minify-btn').classList.toggle('active', mode === 'minify');
        }

        function pasteSample() {
            const lang = document.getElementById('language').value;
            document.getElementById('input-code').value = samples[lang] || '';
            updateStats();
        }

        function clearAll() {
            document.getElementById('input-code').value = '';
            document.getElementById('output-preview').innerHTML = '<span style="color: var(--text-secondary);" data-zh="处理后的代码将显示在这里" data-en="Processed code will appear here">处理后的代码将显示在这里</span>';
            updateStats();
        }

        function copyOutput() {
            const output = document.getElementById('output-preview').textContent;
            if (output && !output.includes('将显示在这里') && !output.includes('will appear here')) {
                navigator.clipboard.writeText(output).then(() => {
                    const btn = document.getElementById('copy-btn');
                    btn.textContent = currentLang === 'zh' ? '已复制!' : 'Copied!';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = currentLang === 'zh' ? '复制' : 'Copy';
                        btn.classList.remove('copied');
                    }, 2000);
                });
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
        }

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.querySelectorAll('[data-zh]').forEach(el => {
                const text = el.getAttribute(`data-${currentLang}`);
                if (text) el.textContent = text;
            });
            document.querySelectorAll('[data-zh-placeholder]').forEach(el => {
                const text = el.getAttribute(`data-${currentLang}-placeholder`);
                if (text) el.placeholder = text;
            });
            document.querySelectorAll('select option').forEach(opt => {
                const text = opt.getAttribute(`data-${currentLang}`);
                if (text) opt.textContent = text;
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        init();
    </script>
</body>
</html>
