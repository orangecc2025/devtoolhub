    const cheatsheetData = [

      { code: '(?:...)', desc: '非捕获分组' },
      { code: 'a|b', desc: '分支' },
      { code: '\\1', desc: '反向引用' }
    ];
    
    function switchLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      document.querySelectorAll('[data-' + lang + ']').forEach(el => {
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'BUTTON') {
          if (el.placeholder || el.textContent.trim()) {
            const key = el.dataset[lang];
            if (el.tagName === 'BUTTON' && !el.querySelector('span')) {
              el.childNodes[0].textContent = key;
            }
          }
        } else {
          if (!el.closest('.flag-btn')) {
            el.textContent = el.dataset[lang];
          }
        }
      });
      renderTemplates();
      renderCheatsheet();
      runTest();
    }
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => switchLang(btn.dataset.lang));
    });
    
    function renderTemplates() {
      const grid = document.getElementById('templatesGrid');
      grid.innerHTML = '';
      templates.forEach(t => {
        const item = document.createElement('div');
        item.className = 'template-item';
        item.innerHTML = `
          <div class="template-name">${currentLang === 'zh' ? t.name : t.nameEn}</div>
          <div class="template-regex">${t.pattern}</div>
        `;
        item.addEventListener('click', () => {
          document.getElementById('regexInput').value = t.pattern;
          runTest();
        });
        grid.appendChild(item);
      });
    }
    
    function renderCheatsheet() {
      const container = document.getElementById('cheatsheet');
      container.innerHTML = '';
      cheatsheetData.forEach(item => {
        const div = document.createElement('div');
        div.className = 'cheatsheet-item';
        div.innerHTML = `<span class="cheatsheet-code">${item.code}</span><span class="cheatsheet-desc">${item.desc}</span>`;
        container.appendChild(div);
      });
    }
    
    function runTest() {
      const pattern = document.getElementById('regexInput').value;
      const testText = document.getElementById('testInput').value;
      const errorEl = document.getElementById('errorMsg');
      const summaryEl = document.getElementById('resultSummary');
      const listEl = document.getElementById('matchList');
      const regexInput = document.getElementById('regexInput');
      
      if (!pattern) {
        errorEl.style.display = 'none';
        regexInput.classList.remove('error');
        summaryEl.textContent = currentLang === 'zh' ? '输入正则表达式开始测试...' : 'Enter a regex to start testing...';
        listEl.innerHTML = '';
        return;
      }
      
      try {
        let flagStr = '';
        if (flags.g) flagStr += 'g';
        if (flags.i) flagStr += 'i';
        if (flags.m) flagStr += 'm';
        if (flags.s) flagStr += 's';
        
        const regex = new RegExp(pattern, flagStr);
        errorEl.style.display = 'none';
        regexInput.classList.remove('error');
        
        const matches = [];
        let match;
        
        if (flags.g) {
          while ((match = regex.exec(testText)) !== null) {
            matches.push({
              text: match[0],
              index: match.index,
              groups: match.slice(1)
            });
            if (match.index === regex.lastIndex) {
              regex.lastIndex++;
            }
          }
        } else {
          match = regex.exec(testText);
          if (match) {
            matches.push({
              text: match[0],
              index: match.index,
              groups: match.slice(1)
            });
          }
        }
        
        if (matches.length > 0) {
          const matchWord = currentLang === 'zh' ? '个匹配' : 'matches';
          summaryEl.textContent = `${matches.length} ${matchWord}`;
          summaryEl.style.background = '#D1FAE5';
          summaryEl.style.color = '#065F46';
        } else {
          const noMatchWord = currentLang === 'zh' ? '无匹配' : 'No match';
          summaryEl.textContent = noMatchWord;
          summaryEl.style.background = '#FEF3C7';
          summaryEl.style.color = '#92400E';
        }
        
        listEl.innerHTML = '';
        matches.forEach((m, i) => {
          const item = document.createElement('div');
          item.className = 'match-item';
          const posLabel = currentLang === 'zh' ? '位置' : 'pos';
          item.innerHTML = `
            <span class="match-index">#${i + 1}</span>
            <span class="match-content">${escapeHtml(m.text)}</span>
            <span class="match-position">${posLabel}: ${m.index}-${m.index + m.text.length}</span>
          `;
          listEl.appendChild(item);
        });
        
        highlightMatches(matches, testText);
        
      } catch (e) {
        errorEl.textContent = e.message;
        errorEl.style.display = 'block';
        regexInput.classList.add('error');
        summaryEl.textContent = currentLang === 'zh' ? '正则表达式有误' : 'Invalid regex';
        summaryEl.style.background = '#FEE2E2';
        summaryEl.style.color = '#991B1B';
        listEl.innerHTML = '';
      }
    }
    
    function highlightMatches(matches, text) {
      // Already handled by updating the summary
    }
    
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    
    document.querySelectorAll('.flag-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const flag = btn.dataset.flag;
        flags[flag] = !flags[flag];
        btn.classList.toggle('active', flags[flag]);
        runTest();
      });
    });
    
    document.getElementById('regexInput').addEventListener('input', runTest);
    document.getElementById('testInput').addEventListener('input', runTest);
    
    document.getElementById('replaceBtn').addEventListener('click', () => {
      performReplace(false);
    });
    
    document.getElementById('replaceAllBtn').addEventListener('click', () => {
      performReplace(true);
    });
    
    function performReplace(all) {
      const pattern = document.getElementById('regexInput').value;
      const testText = document.getElementById('testInput').value;
      const replaceWith = document.getElementById('replaceInput').value;
      const resultEl = document.getElementById('replaceResult');
      
      if (!pattern) {
        resultEl.textContent = testText;
        return;
      }
      
      try {
        let flagStr = '';
        if (flags.g || all) flagStr += 'g';
        if (flags.i) flagStr += 'i';
        if (flags.m) flagStr += 'm';
        if (flags.s) flagStr += 's';
        
        const regex = new RegExp(pattern, flagStr);
        resultEl.textContent = testText.replace(regex, replaceWith);
      } catch (e) {
        resultEl.textContent = testText;
      }
    }
    
    renderTemplates();
    renderCheatsheet();
    runTest();
  </script>
