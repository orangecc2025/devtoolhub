          'プレーンテキストまたはHTML形式でコピーでき、用途に合わせて選べます。',
          '段落、リスト、見出しなど、複数の出力形式に対応しています。',
          '生成する段落数や言語をカスタマイズして、自由に使えます。'
        ]
      }
    };
    
    function switchLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      document.querySelectorAll('[data-' + lang + ']').forEach(el => {
        if (el.placeholder !== undefined) {
          el.placeholder = el.dataset[lang];
        } else {
          el.textContent = el.dataset[lang];
        }
      });
    }
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => switchLang(btn.dataset.lang));
    });
    
    function getRandomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }
    
    function generateWords(lang, count) {
      const words = loremData[lang].words;
      const result = [];
      for (let i = 0; i < count; i++) {
        result.push(getRandomItem(words));
      }
      return result.join(' ');
    }
    
    function generateSentences(lang, count) {
      const sentences = loremData[lang].sentences;
      const result = [];
      for (let i = 0; i < count; i++) {
        result.push(getRandomItem(sentences));
      }
      return result.join(' ');
    }
    
    function generateParagraphs(lang, count) {
      const sentences = loremData[lang].sentences;
      const result = [];
      for (let p = 0; p < count; p++) {
        const paraSentences = [];
        const numSentences = Math.floor(Math.random() * 4) + 3;
        for (let s = 0; s < numSentences; s++) {
          paraSentences.push(getRandomItem(sentences));
        }
        result.push(paraSentences.join(' '));
      }
      return result;
    }
    
    function generateWithTags(content, tagType) {
      if (tagType === 'none') {
        return { html: content.join ? content.join('\n\n') : content, plain: content.join ? content.join('\n\n') : content };
      }
      
      let html = '';
      let plain = '';
      
      if (tagType === 'p') {
        content.forEach(text => {
          html += `<p>${text}</p>\n`;
          plain += text + '\n\n';
        });
      } else if (tagType === 'ul') {
        html += '<ul>\n';
        content.forEach(text => {
          html += `  <li>${text}</li>\n`;
          plain += '• ' + text + '\n';
        });
        html += '</ul>';
        plain = plain.trim();
      } else if (tagType === 'ol') {
        html += '<ol>\n';
        content.forEach(text => {
          html += `  <li>${text}</li>\n`;
          plain += text + '\n';
        });
        html += '</ol>';
        plain = plain.trim();
      } else if (tagType === 'h') {
        const headings = ['h1', 'h2', 'h3', 'h4', 'h5', 'h6'];
        content.forEach((text, i) => {
          const htag = headings[Math.floor(Math.random() * 2)]; // Mostly h1 and h2
          html += `<${htag}>${text}</${htag}>\n`;
          plain += text + '\n\n';
        });
      }
      
      return { html, plain: plain.trim() };
    }
    
    function generate() {
      const lang = document.getElementById('langSelect').value;
      const type = document.getElementById('typeSelect').value;
      const count = parseInt(document.getElementById('countInput').value) || 3;
      const tagType = document.getElementById('tagSelect').value;
      
      let content = [];
      let plainText = '';
      
      switch (type) {
        case 'words':
          plainText = generateWords(lang, count);
          content = [plainText];
          break;
        case 'sentences':
          plainText = generateSentences(lang, count);
          content = [plainText];
          break;
        case 'paragraphs':
          content = generateParagraphs(lang, count);
          plainText = content.join('\n\n');
          break;
        case 'list':
          content = generateParagraphs(lang, count);
          plainText = content.map(t => '• ' + t).join('\n');
          break;
        case 'headings':
          const sentences = loremData[lang].sentences;
          for (let i = 0; i < count; i++) {
            content.push(getRandomItem(sentences));
          }
          plainText = content.join('\n\n');
          break;
      }
      
      let htmlResult;
      if (tagType === 'none') {
        htmlResult = { html: plainText, plain: plainText };
      } else {
        htmlResult = generateWithTags(content, tagType);
      }
      
      generatedText = htmlResult.plain;
      generatedHtml = htmlResult.html;
      
      updateOutput();
      updateStats();
    }
    
    function updateOutput() {
      const previewEl = document.getElementById('previewContent');
      const htmlEl = document.getElementById('htmlContent');
      
      if (currentView === 'preview') {
        if (document.getElementById('tagSelect').value === 'none') {
          previewEl.innerHTML = generatedText.split('\n\n').map(p => `<p>${p}</p>`).join('');
        } else {
          previewEl.innerHTML = generatedHtml;
        }
        previewEl.style.display = 'block';
        htmlEl.style.display = 'none';
      } else {
        previewEl.style.display = 'none';
        htmlEl.style.display = 'block';
        htmlEl.textContent = generatedHtml;
      }
    }
    
    function updateStats() {
      const charCount = generatedText.length;
      const words = generatedText.trim().split(/\s+/).filter(w => w.length > 0);
      const wordCount = words.length;
      const sentences = generatedText.split(/[.。！？.!?]+/).filter(s => s.trim().length > 0);
      const sentenceCount = sentences.length;
      
      document.getElementById('charCount').textContent = charCount;
      document.getElementById('wordCount').textContent = wordCount;
      document.getElementById('sentenceCount').textContent = sentenceCount;
    }
    
    document.querySelectorAll('.output-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.output-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentView = tab.dataset.view;
        updateOutput();
      });
    });
    
    document.getElementById('generateBtn').addEventListener('click', generate);
    
    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const span = btn.querySelector('span') || btn;
        const originalText = span.textContent;
        span.textContent = currentLang === 'zh' ? '已复制' : 'Copied';
        btn.classList.add('copied');
        setTimeout(() => {
          span.textContent = originalText;
          btn.classList.remove('copied');
        }, 1500);
      });
    }
    
    document.getElementById('copyTextBtn').addEventListener('click', function() {
      copyToClipboard(generatedText, this);
    });
    
    document.getElementById('copyHtmlBtn').addEventListener('click', function() {
      copyToClipboard(generatedHtml, this);
    });
    
    // Generate initial content
    generate();
  </script>
