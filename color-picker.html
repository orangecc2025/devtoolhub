  <script>
    const translations = {

    let currentLang = 'zh';
    let currentHue = 239;
    let currentSaturation = 84;
    let currentLightness = 67;
    let colorHistory = [];
    
    function switchLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      document.querySelectorAll('[data-' + lang + ']').forEach(el => {
        el.textContent = el.dataset[lang];
      });
      updateContrastInfo();
    }
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => switchLang(btn.dataset.lang));
    });
    
    function hslToRgb(h, s, l) {
      s /= 100;
      l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const k = (n + h / 30) % 12;
        return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
      };
      return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
    }
    
    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      if (max === min) {
        h = s = 0;
      } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }
      return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
    }
    
    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
    }
    
    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? [parseInt(result[1], 16), parseInt(result[2], 16), parseInt(result[3], 16)] : [0, 0, 0];
    }
    
    function rgbToCmyk(r, g, b) {
      if (r === 0 && g === 0 && b === 0) return [0, 0, 0, 100];
      const c = 1 - r / 255;
      const m = 1 - g / 255;
      const y = 1 - b / 255;
      const k = Math.min(c, m, y);
      return [
        Math.round((c - k) / (1 - k) * 100),
        Math.round((m - k) / (1 - k) * 100),
        Math.round((y - k) / (1 - k) * 100),
        Math.round(k * 100)
      ];
    }
    
    function getLuminance(r, g, b) {
      const [rs, gs, bs] = [r, g, b].map(c => {
        c /= 255;
        return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
      });
      return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
    }
    
    function getContrastRatio(hex1, hex2) {
      const rgb1 = hexToRgb(hex1);
      const rgb2 = hexToRgb(hex2);
      const l1 = getLuminance(...rgb1);
      const l2 = getLuminance(...rgb2);
      const lighter = Math.max(l1, l2);
      const darker = Math.min(l1, l2);
      return (lighter + 0.05) / (darker + 0.05);
    }
    
    function updateColor() {
      const rgb = hslToRgb(currentHue, currentSaturation, currentLightness);
      const hex = rgbToHex(...rgb);
      
      document.getElementById('colorPreview').style.background = hex;
      document.getElementById('hexInput').value = hex;
      document.getElementById('rgbInput').value = `rgb(${rgb.join(', ')})`;
      
      const [h, s, l] = rgbToHsl(...rgb);
      document.getElementById('hslInput').value = `hsl(${currentHue}, ${currentSaturation}%, ${currentLightness}%)`;
      
      const cmyk = rgbToCmyk(...rgb);
      document.getElementById('cmykInput').value = `cmyk(${cmyk[0]}%, ${cmyk[1]}%, ${cmyk[2]}%, ${cmyk[3]}%)`;
      
      document.getElementById('fgPreview').style.background = hex;
      document.getElementById('fgColorInput').value = hex;
      
      const satColor = `hsl(${currentHue}, 100%, 50%)`;
      const lightColor = `hsl(${currentHue}, ${currentSaturation}%, 100%)`;
      document.getElementById('saturationArea').style.background = `linear-gradient(to right, white, ${satColor})`;
      document.getElementById('saturationArea').style.background += `, linear-gradient(to bottom, transparent, black)`;
      document.getElementById('saturationArea').style.background = `linear-gradient(to bottom, transparent, black), linear-gradient(to right, white, hsl(${currentHue}, 100%, 50%))`;
      
      updatePalettes(hex);
      updateContrastInfo();
      
      if (!colorHistory.includes(hex)) {
        colorHistory.unshift(hex);
        if (colorHistory.length > 20) colorHistory.pop();
        renderHistory();
      }
    }
    
    function updatePalettes(hex) {
      const rgb = hexToRgb(hex);
      const hsl = rgbToHsl(...rgb);
      
      const complementary = [
        hex,
        rgbToHex(...hslToRgb((hsl[0] + 180) % 360, hsl[1], hsl[2]))
      ];
      
      const analogous = [
        hex,
        rgbToHex(...hslToRgb((hsl[0] - 30 + 360) % 360, hsl[1], hsl[2])),
        rgbToHex(...hslToRgb((hsl[0] + 30) % 360, hsl[1], hsl[2]))
      ];
      
      const triadic = [
        hex,
        rgbToHex(...hslToRgb((hsl[0] + 120) % 360, hsl[1], hsl[2])),
        rgbToHex(...hslToRgb((hsl[0] + 240) % 360, hsl[1], hsl[2]))
      ];
      
      const tetradic = [
        hex,
        rgbToHex(...hslToRgb((hsl[0] + 90) % 360, hsl[1], hsl[2])),
        rgbToHex(...hslToRgb((hsl[0] + 180) % 360, hsl[1], hsl[2])),
        rgbToHex(...hslToRgb((hsl[0] + 270) % 360, hsl[1], hsl[2]))
      ];
      
      renderPalette('complementary', complementary);
      renderPalette('analogous', analogous);
      renderPalette('triadic', triadic);
      renderPalette('tetradic', tetradic);
    }
    
    function renderPalette(id, colors) {
      const container = document.getElementById(id);
      container.innerHTML = '';
      colors.forEach(color => {
        const div = document.createElement('div');
        div.className = 'palette-color';
        div.style.background = color;
        div.addEventListener('click', () => {
          const rgb = hexToRgb(color);
          const hsl = rgbToHsl(...rgb);
          currentHue = hsl[0];
          currentSaturation = hsl[1];
          currentLightness = hsl[2];
          document.getElementById('hueSlider').value = currentHue;
          updateColor();
        });
        container.appendChild(div);
      });
    }
    
    function renderHistory() {
      const container = document.getElementById('colorHistory');
      container.innerHTML = '';
      colorHistory.forEach(color => {
        const div = document.createElement('div');
        div.className = 'history-color';
        div.style.background = color;
        div.addEventListener('click', () => {
          const rgb = hexToRgb(color);
          const hsl = rgbToHsl(...rgb);
          currentHue = hsl[0];
          currentSaturation = hsl[1];
          currentLightness = hsl[2];
          document.getElementById('hueSlider').value = currentHue;
          updateColor();
        });
        container.appendChild(div);
      });
    }
    
    function updateContrastInfo() {
      const fg = document.getElementById('fgColorInput').value || '#4F46E5';
      const bg = document.getElementById('bgColorInput').value || '#FFFFFF';
      const ratio = getContrastRatio(fg, bg);
      document.getElementById('contrastRatio').textContent = ratio.toFixed(2) + ':1';
      document.getElementById('fgPreview').style.background = fg;
      document.getElementById('bgPreview').style.background = bg;
      
      const levelEl = document.getElementById('contrastLevel');
      if (ratio >= 7) {
        levelEl.textContent = currentLang === 'zh' ? 'AAA级' : 'AAA';
        levelEl.className = 'contrast-level pass';
      } else if (ratio >= 4.5) {
        levelEl.textContent = currentLang === 'zh' ? 'AA级' : 'AA';
        levelEl.className = 'contrast-level pass';
      } else if (ratio >= 3) {
        levelEl.textContent = currentLang === 'zh' ? 'A级' : 'A';
        levelEl.className = 'contrast-level pass';
      } else {
        levelEl.textContent = currentLang === 'zh' ? '不通过' : 'Fail';
        levelEl.className = 'contrast-level fail';
      }
    }
    
    const saturationArea = document.getElementById('saturationArea');
    let isDraggingSat = false;
    
    saturationArea.addEventListener('mousedown', (e) => {
      isDraggingSat = true;
      updateSatFromEvent(e);
    });
    document.addEventListener('mousemove', (e) => {
      if (isDraggingSat) updateSatFromEvent(e);
    });
    document.addEventListener('mouseup', () => isDraggingSat = false);
    
    function updateSatFromEvent(e) {
      const rect = saturationArea.getBoundingClientRect();
      const x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      const y = Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height));
      currentSaturation = Math.round(x * 100);
      currentLightness = Math.round((1 - y) * 100);
      updateCursor();
      updateColor();
    }
    
    function updateCursor() {
      const cursor = document.getElementById('pickerCursor');
      cursor.style.left = currentSaturation + '%';
      cursor.style.top = (100 - currentLightness) + '%';
    }
    
    document.getElementById('hueSlider').addEventListener('input', (e) => {
      currentHue = parseInt(e.target.value);
      updateColor();
    });
    
    document.querySelectorAll('.format-input').forEach(input => {
      input.addEventListener('change', (e) => {
        const val = e.target.value;
        let rgb;
        
        if (val.startsWith('#')) {
          rgb = hexToRgb(val);
        } else if (val.startsWith('rgb')) {
          const match = val.match(/\d+/g);
          if (match && match.length >= 3) {
            rgb = [parseInt(match[0]), parseInt(match[1]), parseInt(match[2])];
          }
        } else if (val.startsWith('hsl')) {
          const match = val.match(/\d+/g);
          if (match && match.length >= 3) {
            rgb = hslToRgb(parseInt(match[0]), parseInt(match[1]), parseInt(match[2]));
          }
        }
        
        if (rgb) {
          const hsl = rgbToHsl(...rgb);
          currentHue = hsl[0];
          currentSaturation = hsl[1];
          currentLightness = hsl[2];
          document.getElementById('hueSlider').value = currentHue;
          updateColor();
        }
      });
    });
    
    document.querySelectorAll('.copy-btn-small').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = document.getElementById(btn.dataset.target);
        navigator.clipboard.writeText(target.value).then(() => {
          btn.textContent = '✓';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = currentLang === 'zh' ? '复制' : 'Copy';
            btn.classList.remove('copied');
          }, 1500);
        });
      });
    });
    
    document.getElementById('fgColorInput').addEventListener('change', updateContrastInfo);
    document.getElementById('bgColorInput').addEventListener('change', updateContrastInfo);
    
    updateColor();
    renderHistory();
  </script>
