  <script>
    const translations = {
      zh: {
        'CSS渐变生成器': 'CSS渐变生成器',
        '可视化编辑线性渐变和径向渐变，实时预览，一键复制CSS代码': '可视化编辑线性渐变和径向渐变，实时预览，一键复制CSS代码',
        '线性渐变': '线性渐变',
        '径向渐变': '径向渐变',
        '渐变角度': '渐变角度',
        '添加颜色节点': '添加颜色节点',
        '生成的CSS代码': '生成的CSS代码',
        '复制CSS代码': '复制CSS代码',
        '复制成功！': '复制成功！',
        '预设模板': '预设模板'
      },
      en: {
        'CSS渐变生成器': 'CSS Gradient Generator',
        '可视化编辑线性渐变和径向渐变，实时预览，一键复制CSS代码': 'Visual editor for linear and radial gradients with real-time preview and one-click CSS copy',
        '线性渐变': 'Linear Gradient',
        '径向渐变': 'Radial Gradient',
        '渐变角度': 'Angle',
        '添加颜色节点': 'Add Color Stop',
        '生成的CSS代码': 'Generated CSS Code',
        '复制CSS代码': 'Copy CSS Code',
        '复制成功！': 'Copied!',
        '预设模板': 'Preset Templates'
      }
    };

    let currentLang = 'zh';
    let gradientType = 'linear';
    let colorStops = [
      { color: '#4F46E5', position: 0 },
      { color: '#06B6D4', position: 100 }
    ];
    
    const presets = [
      { stops: [{ color: '#667eea', pos: 0 }, { color: '#764ba2', pos: 100 }], type: 'linear', angle: 135 },
      { stops: [{ color: '#f093fb', pos: 0 }, { color: '#f5576c', pos: 100 }], type: 'linear', angle: 90 },
      { stops: [{ color: '#4facfe', pos: 0 }, { color: '#00f2fe', pos: 100 }], type: 'linear', angle: 90 },
      { stops: [{ color: '#43e97b', pos: 0 }, { color: '#38f9d7', pos: 100 }], type: 'linear', angle: 90 },
      { stops: [{ color: '#fa709a', pos: 0 }, { color: '#fee140', pos: 100 }], type: 'linear', angle: 90 },
      { stops: [{ color: '#a8edea', pos: 0 }, { color: '#fed6e3', pos: 100 }], type: 'linear', angle: 90 },
      { stops: [{ color: '#ff9a9e', pos: 0 }, { color: '#fecfef', pos: 100 }], type: 'linear', angle: 90 },
      { stops: [{ color: '#ffecd2', pos: 0 }, { color: '#fcb69f', pos: 100 }], type: 'linear', angle: 90 },
      { stops: [{ color: '#a1c4fd', pos: 0 }, { color: '#c2e9fb', pos: 100 }], type: 'linear', angle: 90 },
      { stops: [{ color: '#d299c2', pos: 0 }, { color: '#fef9d7', pos: 100 }], type: 'linear', angle: 90 },
      { stops: [{ color: '#89f7fe', pos: 0 }, { color: '#66a6ff', pos: 100 }], type: 'linear', angle: 90 },
      { stops: [{ color: '#cd9cf2', pos: 0 }, { color: '#f6f3ff', pos: 100 }], type: 'linear', angle: 90 },
      { stops: [{ color: '#fddb92', pos: 0 }, { color: '#d1fdff', pos: 100 }], type: 'linear', angle: 90 },
      { stops: [{ color: '#c471f5', pos: 0 }, { color: '#fa71cd', pos: 100 }], type: 'linear', angle: 90 },
      { stops: [{ color: '#48c6ef', pos: 0 }, { color: '#6f86d6', pos: 100 }], type: 'linear', angle: 90 },
      { stops: [{ color: '#f6d365', pos: 0 }, { color: '#fda085', pos: 100 }], type: 'linear', angle: 90 },
      { stops: [{ color: '#ff3cac', pos: 0 }, { color: '#784ba0', pos: 100 }, { color: '#2b86c5', pos: 100 }], type: 'linear', angle: 135 },
      { stops: [{ color: '#00c6fb', pos: 0 }, { color: '#005bea', pos: 100 }], type: 'linear', angle: 90 }
    ];
    
    function switchLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      document.querySelectorAll('[data-' + lang + ']').forEach(el => {
        if (el.tagName === 'INPUT' || el.tagName === 'BUTTON') {
          if (el.placeholder) el.placeholder = el.dataset[lang];
        } else {
          el.textContent = el.dataset[lang];
        }
      });
    }
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => switchLang(btn.dataset.lang));
    });
    
    function renderColorStops() {
      const container = document.getElementById('colorStops');
      container.innerHTML = '';
      
      colorStops.forEach((stop, index) => {
        const div = document.createElement('div');
        div.className = 'color-stop';
        div.innerHTML = `
          <input type="color" value="${stop.color}" data-index="${index}">
          <input type="text" value="${stop.color}" data-index="${index}" class="color-text">
          <input type="range" min="0" max="100" value="${stop.position}" class="position-slider" data-index="${index}">
          <span class="position-label">${stop.position}%</span>
          ${colorStops.length > 2 ? `<button class="remove-btn" data-index="${index}">×</button>` : ''}
        `;
        container.appendChild(div);
      });
      
      document.querySelectorAll('.color-stop input[type="color"]').forEach(input => {
        input.addEventListener('input', (e) => {
          const idx = parseInt(e.target.dataset.index);
          colorStops[idx].color = e.target.value;
          e.target.parentElement.querySelector('.color-text').value = e.target.value;
          updateGradient();
        });
      });
      
      document.querySelectorAll('.color-text').forEach(input => {
        input.addEventListener('input', (e) => {
          const idx = parseInt(e.target.dataset.index);
          const val = e.target.value;
          if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
            colorStops[idx].color = val;
            e.target.parentElement.querySelector('input[type="color"]').value = val;
            updateGradient();
          }
        });
      });
      
      document.querySelectorAll('.position-slider').forEach(input => {
        input.addEventListener('input', (e) => {
          const idx = parseInt(e.target.dataset.index);
          colorStops[idx].position = parseInt(e.target.value);
          e.target.parentElement.querySelector('.position-label').textContent = e.target.value + '%';
          updateGradient();
        });
      });
      
      document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(e.target.dataset.index);
          colorStops.splice(idx, 1);
          renderColorStops();
          updateGradient();
        });
      });
    }
    
    function generateGradientCSS() {
      const sortedStops = [...colorStops].sort((a, b) => a.position - b.position);
      const colorStr = sortedStops.map(s => `${s.color} ${s.position}%`).join(', ');
      
      if (gradientType === 'linear') {
        const angle = document.getElementById('angleSlider').value;
        return `background: linear-gradient(${angle}deg, ${colorStr});`;
      } else {
        return `background: radial-gradient(circle, ${colorStr});`;
      }
    }
    
    function updateGradient() {
      const preview = document.getElementById('gradientPreview');
      const cssOutput = document.getElementById('cssOutput');
      const css = generateGradientCSS();
      const value = css.replace('background: ', '');
      preview.style.background = value;
      cssOutput.textContent = css;
    }
    
    function renderPresets() {
      const grid = document.getElementById('presetsGrid');
      grid.innerHTML = '';
      
      presets.forEach((preset, index) => {
        const div = document.createElement('div');
        div.className = 'preset-item';
        const sortedStops = [...preset.stops].sort((a, b) => a.pos - b.pos);
        const colorStr = sortedStops.map(s => `${s.color} ${s.pos}%`).join(', ');
        
        if (preset.type === 'linear') {
          div.style.background = `linear-gradient(${preset.angle}deg, ${colorStr})`;
        } else {
          div.style.background = `radial-gradient(circle, ${colorStr})`;
        }
        
        div.addEventListener('click', () => {
          colorStops = preset.stops.map(s => ({ color: s.color, position: s.pos }));
          gradientType = preset.type;
          document.getElementById('angleSlider').value = preset.angle;
          document.getElementById('angleValue').textContent = preset.angle + '°';
          
          document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.type === preset.type);
          });
          document.getElementById('angleControl').style.display = preset.type === 'linear' ? 'flex' : 'none';
          
          renderColorStops();
          updateGradient();
        });
        
        grid.appendChild(div);
      });
    }
    
    document.querySelectorAll('.gradient-type-tabs .tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        gradientType = btn.dataset.type;
        document.querySelectorAll('.gradient-type-tabs .tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('angleControl').style.display = gradientType === 'linear' ? 'flex' : 'none';
        updateGradient();
      });
    });
    
    document.getElementById('angleSlider').addEventListener('input', (e) => {
      document.getElementById('angleValue').textContent = e.target.value + '°';
      updateGradient();
    });
    
    document.getElementById('addColorBtn').addEventListener('click', () => {
      const lastPos = colorStops.length > 0 ? colorStops[colorStops.length - 1].position : 0;
      const newPos = Math.min(lastPos + 20, 100);
      const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
      colorStops.push({ color: randomColor, position: newPos });
      renderColorStops();
      updateGradient();
    });
    
    document.getElementById('copyBtn').addEventListener('click', () => {
      const css = document.getElementById('cssOutput').textContent;
      navigator.clipboard.writeText(css).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = currentLang === 'zh' ? '复制成功！' : 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = currentLang === 'zh' ? '复制CSS代码' : 'Copy CSS Code';
          btn.classList.remove('copied');
        }, 2000);
      });
    });
    
    renderColorStops();
    renderPresets();
    updateGradient();
  </script>
